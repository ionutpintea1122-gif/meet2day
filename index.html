<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meet2Day</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-image: url('fundal.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.55);
            z-index: 0;
            pointer-events: none;
        }
        main, header, .navbar {
            position: relative;
            z-index: 1;
        }
        .judet-card {
            background: rgba(253, 243, 220, 0.97) !important;
            border: 1.5px solid #2d2d2d !important;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15) !important;
        }
        .judet-card:hover {
            background: rgba(250, 239, 200, 0.99) !important;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <a href="index.html" class="navbar-logo">Meet<span>2</span>Day</a>
    <ul class="navbar-links">

        <li><a href="contact.html">Contact</a></li>
        <li><a href="abonament.html" style="color:#f59e0b; font-weight:700;">⭐ Abonament</a></li>
        <li id="navbar-login-btn"><a href="login.html" class="navbar-btn">Login / Sign Up</a></li>
        <li id="navbar-user-zone" style="display:none;" class="navbar-user">
            <span class="navbar-user-name" id="navbar-user-name"></span>
            <button class="navbar-logout" onclick="logout()">Logout</button>
        </li>
    </ul>
</nav>

        </a>
